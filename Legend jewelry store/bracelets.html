<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Earrings - Legend Jewelry Store</title>

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>

    <div class="logo">
        <h1>Legend Jewelry Store</h1>
    </div>

    <nav>
        <a href="home.html">Home</a>
        <a href="product.html">Products</a>
        <a href="cart.html">Cart</a>
    </nav>

</header>

<section class="all-products">

    <h2>Bracelet Collection</h2>

    <div class="all-product-grid">

        <!-- PRODUCT 1 -->

        <a href="bracelet product.html" class="product-link">

            <div class="product-card">

                <img src="images/bracelet.jpg" alt="Earring">

                <h3>Rolex Bracelet</h3>

                <div class="price-box">
                    <p class="new-price">₦25,000</p>
                    <p class="old-price">₦30,000</p>
                </div>

                 <button onclick="event.preventDefault(); addToCart('Diamond bracelet',25000)">
    Add to Cart
</button>

            </div>

        </a>

        <!-- PRODUCT 2 -->

        <a href="bracelet product1.html" class="product-link">

            <div class="product-card">

                <img src="images/Silver Bracelet.jpg" alt="Luxury Earring">

                <h3>Daimond bracelet</h3>

                <div class="price-box">
                    <p class="new-price">₦35,000</p>
                    <p class="old-price">₦45,000</p>
                </div>

                 <button onclick="event.preventDefault(); addToCart('Diamond bracelet',25000)">
    Add to Cart
</button>

            </div>

        </a>

    </div>

</section>
<script src="js/app.js"></script>
</body>
</html>
